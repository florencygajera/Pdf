version: "3.9"

services:

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - MAX_FILE_SIZE_MB=100
      # FIX: raised from 120 — Gujarati/Indic script needs ≥ 150 DPI
      - OCR_DPI=150
      # FIX: primary language is Gujarati; model also handles embedded English/digits
      - OCR_LANGUAGES=["gu","en"]
      - OCR_USE_GPU=false
      # FIX: Gujarati OCR confidence runs 0.3–0.6; was 0.5 which filtered valid results
      - OCR_CONFIDENCE_THRESHOLD=0.3
      # FIX: fully-scanned pages have text_coverage=0; tighter threshold prevents misclassification
      - DIGITAL_TEXT_THRESHOLD=0.01
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - RATE_LIMIT_UPLOAD=10/minute
      - RATE_LIMIT_EXTRACT=60/minute
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads:/tmp/pdf_uploads
      - outputs:/tmp/pdf_outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      target: runtime
    command: >
      celery -A app.workers.celery_worker worker
      --pool=prefork
      --loglevel=info
      --concurrency=1
      --prefetch-multiplier=1
      --queues=celery
      --max-tasks-per-child=30
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - MAX_FILE_SIZE_MB=100
      # FIX: OCR runs in the WORKER (Celery task), not the API process.
      # Previously this block had no OCR_LANGUAGES entry — the worker fell back
      # to the code default (["en"]) even when the API had the right .env value.
      # Both the api and worker containers must have identical OCR settings.
      - OCR_DPI=150
      - OCR_LANGUAGES=["gu","en"]
      - OCR_USE_GPU=false
      - OCR_CONFIDENCE_THRESHOLD=0.3
      - DIGITAL_TEXT_THRESHOLD=0.01
      # FIX: CELERY_TASK_TIMEOUT raised to match intended value.
      # PaddleOCR on 6 scanned pages takes 30–90 s. At the old code default
      # (15 s) the task was killed by SoftTimeLimitExceeded before finishing.
      - CELERY_TASK_TIMEOUT=300
      - LOG_FORMAT=json
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads:/tmp/pdf_uploads
      - outputs:/tmp/pdf_outputs

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      - redis
    profiles:
      - monitoring

volumes:
  redis_data:
  uploads:
  outputs: