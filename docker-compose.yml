version: "3.9"

# ── Full stack: FastAPI + Celery Worker + Redis ─────────────────────────────
services:

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - MAX_FILE_SIZE_MB=100
      - OCR_DPI=150
      - OCR_LANGUAGE=gu
      - OCR_LANGUAGES=["gu","en"]
      - OCR_USE_GPU=false
      - OCR_CONFIDENCE_THRESHOLD=0.3
      - CELERY_TASK_TIMEOUT=300
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - RATE_LIMIT_UPLOAD=10/minute
      - RATE_LIMIT_EXTRACT=60/minute
    env_file:
      - .env                          # API_KEY and SECRET_KEY go here — never commit
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads:/tmp/pdf_uploads
      - outputs:/tmp/pdf_outputs
    healthcheck:
      # FIX: was /healthz which returns 401 when API_KEY is configured.
      # /ping is an unauthenticated zero-dependency liveness stub added for
      # exactly this purpose — Docker probes cannot supply an API key header.
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      target: runtime
    command: >
      celery -A app.workers.celery_worker worker
      --pool=prefork
      --loglevel=info
      --concurrency=1
      --prefetch-multiplier=1
      --queues=celery
      --max-tasks-per-child=30
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - REDIS_URL=redis://redis:6379/0
      - MAX_FILE_SIZE_MB=100
      - OCR_DPI=150
      - OCR_LANGUAGE=gu
      - OCR_LANGUAGES=["gu","en"]
      - OCR_USE_GPU=false
      - OCR_CONFIDENCE_THRESHOLD=0.3
      - CELERY_TASK_TIMEOUT=300
      - LOG_FORMAT=json
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads:/tmp/pdf_uploads
      - outputs:/tmp/pdf_outputs

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    depends_on:
      - redis
    profiles:
      - monitoring            # start with: docker compose --profile monitoring up

volumes:
  redis_data:
  uploads:
  outputs:
